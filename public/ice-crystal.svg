<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main crystal hexagon -->
  <polygon 
    points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" 
    fill="url(#iceGradient)" 
    filter="url(#glow)"
    opacity="0.9"
  />
  
  <!-- Inner highlight -->
  <polygon 
    points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" 
    fill="none" 
    stroke="#93c5fd" 
    stroke-width="1.5"
    opacity="0.6"
  />
  
  <!-- Center detail -->
  <polygon 
    points="50,30 65,40 65,60 50,70 35,60 35,40" 
    fill="#dbeafe" 
    opacity="0.4"
  />
  
  <!-- Sparkle effects -->
  <circle cx="50" cy="20" r="2" fill="white" opacity="0.8"/>
  <circle cx="75" cy="35" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="25" cy="65" r="1.5" fill="white" opacity="0.6"/>
</svg>
